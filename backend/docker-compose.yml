services:
  api:
    build: .
    ports: ["4000:4000"]
    env_file: .env
    depends_on: [mongo, redis]
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
  worker:
    build: .
    command: node src/queues/worker.js
    env_file: .env
    depends_on: [mongo, redis]
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo-data:/data/db]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
volumes:
  mongo-data:
  redis-data:
